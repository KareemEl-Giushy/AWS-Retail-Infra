---
- name: Configure Kubernetes Cluster (Master Node)
  hosts: _master
  vars_files:
    - ./varfile.yml
  tasks:
    - name: Reset Kubeadm to Reset IP on Image
      ansible.builtin.command:
        cmd: kubeadm reset -f
      become: true
    
    - name: Initialize Kubeadm again
      ansible.builtin.shell: kubeadm init --apiserver-advertise-address={{ masterIP }} --pod-network-cidr={{ podCIDR }}
      become: true

    - name: Delete .kube Directory
      ansible.builtin.command:
        cmd: rm -rf ~/.kube

    - name: Make New .kube Directory
      ansible.builtin.command:
        cmd: mkdir -p $HOME/.kube

    - name: New .kube Configuration
      ansible.builtin.copy:
        src: /etc/kubernetes/admin.conf
        dest: /home/ubuntu/.kube/config
        remote_src: yes
        owner: ubuntu
        group: ubuntu
        mode: '0600'
      become: true

    - name: Apply Networking CNI Plugin
      ansible.builtin.shell: kubectl apply -f https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml
      ignore_errors: true
      become: true

    - name: Generate join command
      ansible.builtin.command: kubeadm token create --print-join-command
      register: join_command_raw

    - name: Save join command to a local file
      ansible.builtin.copy:
        content: "{{ join_command_raw.stdout }}"
        dest: "./k8s_join_command.txt"
      delegate_to: localhost

    - name: Download Kubectl Config File
      ansible.builtin.fetch:
        src: /home/ubuntu/.kube/config
        dest: ./k8s.config
        flat: true